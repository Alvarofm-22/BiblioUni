<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="mainTemplate.html :: layout">

<body>

<div th:fragment="content">

    <div class="container mt-4">

        <h2 class="mb-4">Registrar Cupón</h2>

        <form th:action="@{/cupones/guardar}" th:object="${cupon}" method="post">

            <div class="mb-3">
                <label class="form-label">Código</label>
                <input type="text" th:field="*{codigo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descuento</label>
                <input type="number" step="0.01" th:field="*{descuento}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha Expiración</label>
                <input type="date" th:field="*{fechaExpiracion}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Activo</label>
                <select th:field="*{activo}" class="form-control">
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Guardar
            </button>

            <a th:href="@{/cupones}" class="btn btn-secondary">
                Volver
            </a>

        </form>

    </div>

</div>

</body>
</html>
